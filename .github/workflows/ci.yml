# .github/workflows/ci.yml
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      MONGO_URI: ongodb+srv://juli:so72rROmGG4oSg3H@cluster0.tkzhljx.mongodb.net/
      MONGO_DB_NAME: mindtrack_db
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Lint with flake8
        run: flake8 backend/app backend/tests --max-line-length=100 --extend-ignore=E501
      - name: Run tests
        run: |
          pytest -v --tb=short --cov=app --cov-report=term-missing --cov-fail-under=70
