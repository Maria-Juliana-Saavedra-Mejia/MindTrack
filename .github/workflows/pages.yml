# Publishes static login UI to GitHub Pages with API URL available to the browser.
#
# Set ONE of (Settings → Secrets and variables → Actions):
#   • Secret MINDTRACK_API_BASE  — preferred (masked in logs)
#   • Variable MINDTRACK_API_BASE — ok for a public API URL
# Value: https://your-api.onrender.com  (HTTPS root only, no /api suffix)
#
# Settings → Pages → Source: GitHub Actions
#
# On the API host: CORS_ORIGINS=https://YOURGITHUBUSERNAME.github.io, FLASK_ENV=production
name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build static site folder
        run: |
          mkdir -p _site
          cp index.html _site/index.html
          cp -r frontend _site/frontend
          if [ -f .nojekyll ]; then cp .nojekyll _site/.nojekyll; else touch _site/.nojekyll; fi

      - name: Inject API URL for Pages (meta + mindtrack-api.json)
        env:
          SECRET_API: ${{ secrets.MINDTRACK_API_BASE }}
          VAR_API: ${{ vars.MINDTRACK_API_BASE }}
        run: |
          API="${SECRET_API:-}"
          if [ -z "$API" ]; then API="${VAR_API:-}"; fi
          API="$(printf '%s' "$API" | tr -d '\r' | sed 's/[[:space:]]*$//')"
          if [ -z "$API" ]; then
            echo "::warning::Set secret or variable MINDTRACK_API_BASE — otherwise GitHub Pages login will fail."
            exit 0
          fi
          export MINDTRACK_API_BASE="$API"
          python3 << 'PY'
          import html
          import json
          import os
          import pathlib
          import re

          base = (os.environ.get("MINDTRACK_API_BASE") or "").strip()
          if not base:
              raise SystemExit(0)
          esc = html.escape(base, quote=True)
          site = pathlib.Path("_site")
          idx = site / "index.html"
          text = idx.read_text(encoding="utf-8")

          (site / "mindtrack-api.json").write_text(
              json.dumps({"apiBase": base}, separators=(",", ":")),
              encoding="utf-8",
          )

          patterns = [
              r'(<meta\s+name="mindtrack-api-base"\s+content=")[^"]*("\s*/>)',
              r'(<meta\s+content=")[^"]*("\s+name="mindtrack-api-base"\s*/>)',
          ]
          new_text = None
          n = 0
          for pat in patterns:
              new_text, n = re.subn(
                  pat, lambda m: m.group(1) + esc + m.group(2), text, count=1
              )
              if n == 1:
                  break
          if n != 1:
              raise SystemExit("Could not patch mindtrack-api-base meta in _site/index.html")
          idx.write_text(new_text, encoding="utf-8")
          PY

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - id: deployment
        uses: actions/deploy-pages@v4
