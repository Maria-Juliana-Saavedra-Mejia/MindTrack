# Publishes the static login UI to GitHub Pages with your API URL baked into index.html.
#
# Setup (once):
#   1) Settings → Secrets and variables → Actions → New repository secret
#      Name: MINDTRACK_API_BASE
#      Value: https://your-api.onrender.com   (HTTPS root only, no /api suffix)
#   2) Settings → Pages → Build and deployment → Source: GitHub Actions
#
# API host (.env on Render/Fly/etc.):
#   CORS_ORIGINS=https://YOURGITHUBUSERNAME.github.io
#   FLASK_ENV=production
#   (HTTPS API required — GitHub Pages is HTTPS.)
name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build static site folder
        run: |
          mkdir -p _site
          cp index.html _site/index.html
          cp -r frontend _site/frontend
          if [ -f .nojekyll ]; then cp .nojekyll _site/.nojekyll; else touch _site/.nojekyll; fi

      - name: Inject mindtrack-api-base from secret
        env:
          MINDTRACK_API_BASE: ${{ secrets.MINDTRACK_API_BASE }}
        run: |
          if [ -z "${MINDTRACK_API_BASE:-}" ]; then
            echo "::warning::Secret MINDTRACK_API_BASE is empty — login on Pages will fail until you set it (repo Settings → Secrets → Actions)."
            exit 0
          fi
          python3 << 'PY'
          import html
          import os
          import pathlib
          import re

          base = (os.environ.get("MINDTRACK_API_BASE") or "").strip()
          path = pathlib.Path("_site/index.html")
          text = path.read_text(encoding="utf-8")
          esc = html.escape(base, quote=True)
          pattern = r'(<meta\s+name="mindtrack-api-base"\s+content=")[^"]*("\s*/>)'

          def repl(m):
              return m.group(1) + esc + m.group(2)

          new_text, n = re.subn(pattern, repl, text, count=1)
          if n != 1:
              raise SystemExit("Could not find mindtrack-api-base meta in _site/index.html")
          path.write_text(new_text, encoding="utf-8")
          PY

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - id: deployment
        uses: actions/deploy-pages@v4
