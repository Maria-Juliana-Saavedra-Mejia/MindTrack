<!-- templates/base.html -->
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="mindtrack-base-path" content="/" />
    <meta name="mindtrack-api-base" content="" />
    <title>{% block title %}MindTrack{% endblock %}</title>
    <link rel="icon" type="image/svg+xml" href="/static/favicon.svg" />
    <script>
      window.MINDTRACK_DEFAULT_API = window.MINDTRACK_DEFAULT_API || "";
    </script>
    <script>
      (function () {
        var meta = document.querySelector('meta[name="mindtrack-base-path"]');
        if (meta && meta.getAttribute("content") && String(meta.getAttribute("content")).trim() !== "") {
          window.MINDTRACK_BASE = String(meta.getAttribute("content")).trim().replace(/\/?$/, "/");
        } else {
          window.MINDTRACK_BASE = "/";
        }
      })();
    </script>
    <link rel="stylesheet" href="/static/css/global.css" />
    {% block styles %}{% endblock %}
  </head>
  <body>
    <div class="layout">
      <aside class="sidebar">
        <a href="/profile" class="sidebar-logo-link" aria-label="Profile and settings">
          <div class="logo">
            <img
              src="/static/images/mindtrack-logo.png"
              alt=""
              class="app-logo"
              width="200"
            />
          </div>
        </a>
        <nav>
          <a href="/dashboard" class="{{ 'active' if request.path == '/dashboard' else '' }}"
            >Dashboard</a
          >
          <a href="/habits" class="{{ 'active' if request.path == '/habits' else '' }}">Habits</a>
          <a href="/log" class="{{ 'active' if request.path == '/log' else '' }}">Log</a>
          <a href="/profile" class="{{ 'active' if request.path == '/profile' else '' }}">Profile</a>
        </nav>
        <button class="btn-ghost" id="logout-btn" style="color: #fff; border-color: #ffffff55">
          Logout
        </button>
      </aside>
      <div class="main">
        <header class="topbar">
          <div class="topbar-left">
            <div class="page-title">{% block page_title %}MindTrack{% endblock %}</div>
            <p class="page-tagline">{% block page_tagline %}{% endblock %}</p>
          </div>
          <a href="/profile" class="topbar-profile-link" id="topbar-profile-link" aria-label="Open profile and settings">
            <span class="topbar-profile-name" id="user-name">User</span>
            <span class="avatar" id="user-initials">MT</span>
          </a>
        </header>
        <main class="content">{% block content %}{% endblock %}</main>
      </div>
    </div>
    <script src="/static/js/api.js"></script>
    <script src="/static/js/user-header.js"></script>
    {% block scripts %}{% endblock %}
  </body>
</html>
