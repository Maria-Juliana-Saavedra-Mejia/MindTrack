<!-- templates/base.html -->
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="mindtrack-base-path" content="/" />
    <meta name="mindtrack-api-base" content="" />
    <meta name="mindtrack-dev-api-port" content="{{ mindtrack_http_port }}" />
    <title>{% block title %}MindTrack{% endblock %}</title>
    <link rel="icon" type="image/svg+xml" href="/static/favicon.svg" />
    <script>
      window.MINDTRACK_DEFAULT_API = window.MINDTRACK_DEFAULT_API || "";
    </script>
    <script>
      (function () {
        var meta = document.querySelector('meta[name="mindtrack-base-path"]');
        if (meta && meta.getAttribute("content") && String(meta.getAttribute("content")).trim() !== "") {
          window.MINDTRACK_BASE = String(meta.getAttribute("content")).trim().replace(/\/?$/, "/");
        } else {
          window.MINDTRACK_BASE = "/";
        }
      })();
    </script>
    <link rel="stylesheet" href="/static/css/global.css" />
    {% block styles %}{% endblock %}
  </head>
  <body>
    <div class="layout">
      <aside class="sidebar">
        <a href="/profile" class="sidebar-logo-link" aria-label="Profile and settings">
          <div class="logo">
            <img
              src="/static/images/mindtrack-logo.png"
              alt=""
              class="app-logo"
              width="160"
            />
          </div>
        </a>
        <nav class="sidebar-nav" aria-label="Main">
          <a
            href="/dashboard"
            class="sidebar-nav__link {{ 'active' if request.path == '/dashboard' else '' }}"
          >
            <svg class="sidebar-nav__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <rect x="3" y="3" width="7" height="9" rx="1" />
              <rect x="14" y="3" width="7" height="5" rx="1" />
              <rect x="14" y="12" width="7" height="9" rx="1" />
              <rect x="3" y="16" width="7" height="5" rx="1" />
            </svg>
            <span>Dashboard</span>
          </a>
          <a href="/habits" class="sidebar-nav__link {{ 'active' if request.path == '/habits' else '' }}">
            <svg class="sidebar-nav__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
              <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14" />
              <polyline points="22 4 12 14.01 9 11.01" />
            </svg>
            <span>Habits</span>
          </a>
          <a href="/log" class="sidebar-nav__link {{ 'active' if request.path == '/log' else '' }}">
            <svg class="sidebar-nav__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
              <rect x="3" y="4" width="18" height="18" rx="2" ry="2" />
              <line x1="16" y1="2" x2="16" y2="6" />
              <line x1="8" y1="2" x2="8" y2="6" />
              <line x1="3" y1="10" x2="21" y2="10" />
            </svg>
            <span>Log</span>
          </a>
          <a href="/profile" class="sidebar-nav__link {{ 'active' if request.path == '/profile' else '' }}">
            <svg class="sidebar-nav__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
              <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" />
              <circle cx="12" cy="7" r="4" />
            </svg>
            <span>Profile</span>
          </a>
        </nav>
        <div class="sidebar-footer">
          <button class="btn-ghost btn-sidebar-logout" id="logout-btn" type="button">Log out</button>
        </div>
      </aside>
      <div class="main">
        <header class="topbar">
          <div class="topbar-left">
            <div class="page-title">{% block page_title %}MindTrack{% endblock %}</div>
            <p class="page-tagline">{% block page_tagline %}{% endblock %}</p>
          </div>
          <a href="/profile" class="topbar-profile-link" id="topbar-profile-link" aria-label="Open profile and settings">
            <span class="topbar-profile-name" id="user-name">User</span>
            <span class="avatar" id="user-initials">MT</span>
          </a>
        </header>
        <main class="content">{% block content %}{% endblock %}</main>
      </div>
    </div>
    <script src="/static/js/api.js"></script>
    <script src="/static/js/user-header.js"></script>
    {% block scripts %}{% endblock %}
  </body>
</html>
