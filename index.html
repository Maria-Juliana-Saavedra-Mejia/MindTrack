<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!--
      Deployment (GitHub Pages + API on Render/Fly/etc.):
      • Easiest: GitHub Actions Pages — set repo secret MINDTRACK_API_BASE=https://your-api.host (no /api).
        Settings → Pages → Source: GitHub Actions. See README.md "GitHub Pages".
      • Or set mindtrack-api-base / MINDTRACK_DEFAULT_API below to that HTTPS root.
      • On the API: CORS_ORIGINS=https://youruser.github.io, FLASK_ENV=production.
    -->
    <meta name="mindtrack-base-path" content="" />
    <meta name="mindtrack-api-base" content="" />
    <!-- Live Server + API on another port: set the API port here (e.g. 8000 for uvicorn) or use window.MINDTRACK_DEV_API_PORT. If you use python3 run.py, use the port printed in the terminal (often 5050–5059). -->
    <meta name="mindtrack-dev-api-port" content="" />
    <title>MindTrack — Login</title>
    <script>
      window.MINDTRACK_DEFAULT_API = "";
      /*
        Easiest: open only the URL printed by `python3 run.py` (same port for UI + API).
        Live Server (e.g. :5500) with API elsewhere:
          • Default API base port in api.js is 8000 (typical uvicorn). For `python3 run.py`, pin the terminal port:
          • ?mt_api_port=PORT   (e.g. ?mt_api_port=5051 or ?mt_api_port=8000)
          • Or full URL: ?api=http://127.0.0.1:PORT
          • Or set meta mindtrack-dev-api-port above, or uncomment:
      */
      // window.MINDTRACK_DEV_API_PORT = "8000";
    </script>
    <script>
      (function () {
        function mindtrackStaticAppRootFromPathname() {
          var parts = location.pathname.split("/").filter(Boolean);
          var last = parts.length ? parts[parts.length - 1] : "";
          if (last === "login" || /\.html?$/i.test(last)) {
            parts.pop();
          }
          if (!parts.length) {
            return "/";
          }
          return "/" + parts.join("/") + "/";
        }
        var meta = document.querySelector('meta[name="mindtrack-base-path"]');
        var explicit = meta && meta.getAttribute("content") && String(meta.getAttribute("content")).trim() !== "";
        if (explicit) {
          window.MINDTRACK_BASE = String(meta.getAttribute("content")).trim().replace(/\/?$/, "/");
        } else {
          window.MINDTRACK_BASE = mindtrackStaticAppRootFromPathname();
        }
      })();
    </script>
    <link rel="icon" type="image/svg+xml" href="frontend/static/favicon.svg" />
    <link rel="stylesheet" href="frontend/static/css/login.css" />
  </head>
  <body>
    <div class="auth-shell">
      <div class="brand-panel">
        <div>
          <div class="brand-logo-wrap">
            <img src="frontend/static/images/mindtrack-logo.png" alt="MindTrack" class="brand-logo" width="320" />
          </div>
          <p class="tagline">Build habits. Track progress. Stay consistent.</p>
        </div>
        <ul class="feature-list">
          <li>✔ Personalized streak tracking</li>
          <li>✔ Visual progress with charts</li>
          <li>✔ AI coach insights on demand</li>
        </ul>
      </div>
      <div class="form-panel">
        <div class="auth-card">
          <div class="tabs">
            <button type="button" class="tab-button active" id="tab-login">Log In</button>
            <button type="button" class="tab-button" id="tab-register">Register</button>
          </div>
          <div class="tab-panel active" id="panel-login">
            <form id="login-form" class="form-grid">
              <div>
                <label for="login-email">Email</label>
                <input type="email" id="login-email" autocomplete="email" />
                <div class="field-error" id="login-email-error"></div>
              </div>
              <div>
                <label for="login-password">Password</label>
                <input type="password" id="login-password" autocomplete="current-password" />
                <div class="field-error" id="login-password-error"></div>
              </div>
              <label class="checkbox-row">
                <input type="checkbox" id="remember-me" />
                Remember me
              </label>
              <button type="submit" class="btn-primary">Log In</button>
            </form>
          </div>
          <div class="tab-panel" id="panel-register">
            <form id="register-form" class="form-grid">
              <div>
                <label for="register-name">Full Name</label>
                <input type="text" id="register-name" autocomplete="name" />
                <div class="field-error" id="reg-name-error"></div>
              </div>
              <div>
                <label for="register-email">Email</label>
                <input type="email" id="register-email" autocomplete="email" />
                <div class="field-error" id="reg-email-error"></div>
              </div>
              <div>
                <label for="register-password">Password</label>
                <input type="password" id="register-password" autocomplete="new-password" />
                <div class="field-error" id="reg-pass-error"></div>
              </div>
              <div>
                <label for="register-confirm">Confirm Password</label>
                <input type="password" id="register-confirm" autocomplete="new-password" />
                <div class="field-error" id="reg-confirm-error"></div>
              </div>
              <button type="submit" class="btn-primary">Create Account</button>
            </form>
          </div>
        </div>
      </div>
    </div>
    <script src="frontend/static/js/api.js"></script>
    <script src="frontend/static/js/auth.js"></script>
  </body>
</html>
